services:

  db:
    image: postgres:16-alpine
    container_name: ttrpg_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ttrpg
      POSTGRES_USER: ttrpg
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_secure_pass}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttrpg -d ttrpg"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - ttrpg_net

  backend:
    build: ./backend
    container_name: ttrpg_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ttrpg:${DB_PASSWORD:-changeme_secure_pass}@db:5432/ttrpg
      SECRET_KEY: ${SECRET_KEY:-changeme_secret_key_32chars_min}
      UPLOAD_FOLDER: /app/uploads
      MAX_CONTENT_LENGTH: 52428800
      FLASK_ENV: ${FLASK_ENV:-production}
    volumes:
      - ./data/uploads:/app/uploads
    expose:
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - ttrpg_net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: ttrpg_frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - ttrpg_net

  nginx:
    image: nginx:alpine
    container_name: ttrpg_nginx
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/uploads:/app/uploads:ro
    networks:
      - ttrpg_net

networks:
  ttrpg_net:
    driver: bridge
